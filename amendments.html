<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#234a9d" />
    <title>Plier Amendments</title>
    <meta name="description" content="Track versioned updates, clarifications, and doctrine changes in the Plier Method." />
    <link rel="canonical" href="/amendments.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Plier Amendments" />
    <meta property="og:description" content="The doctrine archive for Plier Method updates and clarifications." />
    <meta property="og:url" content="/amendments.html" />
    <script>
      (() => {
        const absoluteUrl = new URL(window.location.pathname, window.location.origin).toString()
        const canonical = document.querySelector('link[rel="canonical"]')
        const ogUrl = document.querySelector('meta[property="og:url"]')
        if (canonical) canonical.href = absoluteUrl
        if (ogUrl) ogUrl.content = absoluteUrl
      })()
    </script>
    <meta property="og:image" content="/og-card.svg" />
    <meta name="twitter:image" content="/og-card.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Plier Amendments" />
    <meta name="twitter:description" content="Version history for a living culinary taxonomy." />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/amendments.js"></script>
  </body>
</html>
